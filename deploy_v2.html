function log(msg, type) {
  const d = document.createElement('div');
  d.className = 'box ' + (type||'info');
  d.innerHTML = msg;
  document.getElementById('log').appendChild(d);
}

async function doDeploy() {
  const token = document.getElementById('token').value.trim();
  if (!token) { log('❌ Inserisci il token.', 'err'); return; }
  const btn = document.getElementById('btn');
  btn.disabled = true; btn.textContent = '⏳ Upload in corso…';
  document.getElementById('log').innerHTML = '';

  const headers = {
    Authorization: `token ${token}`,
    Accept: 'application/vnd.github.v3+json',
    'Content-Type': 'application/json'
  };
  const base = `https://api.github.com/repos/${REPO}/contents/${PATH}`;

  try {
    // Controlla se il file esiste già (per ottenere sha)
    log('1/2 — Controllo file esistente…', 'info');
    let sha = null;
    const check = await fetch(base, { headers });
    if (check.ok) {
      const j = await check.json();
      sha = j.sha;
      log('File esistente trovato — aggiornamento in corso…', 'warn');
    } else {
      log('File non esistente — creazione…', 'info');
    }

    // Upload
    log('2/2 — Upload (322 KB)…', 'info');
    const body = {
      message: 'Deploy dashboard Firebase — gettoniere-shop',
      content: B64
    };
    if (sha) body.sha = sha;

    const r = await fetch(base, {
      method: 'PUT', headers,
      body: JSON.stringify(body)
    });

    if (!r.ok) {
      const e = await r.json();
      throw new Error(`${r.status}: ${e.message}`);
    }
    const j = await r.json();
    const commitSha = j.commit?.sha?.slice(0,7) || 'ok';
    log(`✅ <strong>DEPLOY COMPLETATO!</strong> Commit: <code>${commitSha}</code><br><br>
         Il sito sarà attivo su:<br>
         <a href="https://tullio2008s-ai.github.io/gettoniere-dashboard-v2/" 
            target="_blank" style="color:#60a5fa">
           https://tullio2008s-ai.github.io/gettoniere-dashboard-v2/
         </a><br><br>
         ⚠️ Ricorda di attivare <strong>GitHub Pages</strong> nelle Settings del repo
         (Settings → Pages → Branch: main → Save).`, 'ok');
    btn.textContent = '✅ Completato';

  } catch(e) {
    log('❌ Errore: ' + e.message, 'err');
    btn.disabled = false; btn.textContent = '🔄 Riprova';
  }
}
</script>
